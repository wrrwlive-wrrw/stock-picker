<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>智能选股指导系统</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- 登录页 -->
  <div class="login-page" id="loginPage">
    <div class="login-box">
      <div class="login-header">
        <h1>📈 智能选股指导系统</h1>
        <p>请登录后使用</p>
      </div>
      <div class="form-group">
        <label>账号</label>
        <input type="text" id="loginUser" placeholder="请输入账号">
      </div>
      <div class="form-group">
        <label>密码</label>
        <input type="password" id="loginPwd" placeholder="请输入密码" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <button class="btn-login" onclick="doLogin()">登 录</button>
      <div class="login-tip">管理员：admin/admin123 | 用户：user/123456</div>
    </div>
  </div>

  <!-- 顶部导航 -->
  <nav class="top-nav" id="topNav" style="display:none">
    <div class="nav-left">
      <span class="logo">📈 智能选股指导</span>
    </div>
    <div class="nav-right">
      <span class="market-time" id="marketTime"></span>
      <span id="userInfo" style="margin-left:12px"></span>
      <button class="btn-logout" onclick="doLogout()">退出</button>
    </div>
  </nav>

  <!-- 主布局 -->
  <div class="app-container" id="appContainer" style="display:none">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="content" id="mainContent"></main>
  </div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/market.js"></script>
  <script src="js/methodology.js"></script>
  <script src="js/macro.js"></script>
  <script src="js/stock-query.js"></script>
  <script src="js/strategy.js"></script>
  <script src="js/recommend.js"></script>
  <script src="js/watchlist.js"></script>
</body>
</html>
